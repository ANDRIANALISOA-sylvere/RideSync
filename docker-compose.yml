services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  location-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: location_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"

  ride-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ride_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"

  pg-admin:
    image: dpage/pgadmin4:7
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ridesync.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - location-db
      - ride-db
      - notification-db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - rabbitmq
      - redis

  location-service:
    build: ./location-service
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - location-db
      - rabbitmq
      - redis

  ride-service:
    build: ./ride-service
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      - ride-db
      - rabbitmq
      - redis

  notification-service:
    build: ./notification-service
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      - notification-db
      - rabbitmq

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  pgadmin_data:
