version: "3.6"

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  location-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: location_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  ride-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ride_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
  ports:
    - "5434:5432"

  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - rabbitmq
      - redis

  location-service:
    build: ./location-service
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - location-db
      - rabbitmq
      - redis

  ride-service:
    build: ./ride-service
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      - ride-db
      - rabbitmq
      - redis

  notification-service:
    build: ./notification-service
    ports:
      - "3003:3003"
    env_file: .env
    depends_on:
      - notification-db
      - rabbitmq
